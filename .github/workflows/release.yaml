name: Release

permissions:
  contents: write # necesario para push de commits y tags
  pull-requests: write
  issues: write
  id-token: write
on:
  push:
    branches:
      - main
      - next
      - beta
jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm audit signatures
      - run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
